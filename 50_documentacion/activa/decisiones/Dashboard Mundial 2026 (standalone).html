  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f871edbb-8705-4ac1-a391-f60668023961\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9277fcba-4557-461f-b9f4-3dcfae2f5501\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"97f01aa1-602c-4d86-8abe-d93b71d0ff94\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html,body{margin:0;background:#FCFBF7;color:#16181D;font-family:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  *{box-sizing:border-box;}\n  :focus-visible{outline:2px solid #C8202B;outline-offset:2px;}\n  ::selection{background:#F2D34E;color:#10294F;}\n  ::-webkit-scrollbar{height:10px;width:10px;}\n  ::-webkit-scrollbar-track{background:#EFEAE0;}\n  ::-webkit-scrollbar-thumb{background:#C7BEAD;}\n  ::-webkit-scrollbar-thumb:hover{background:#ABA089;}\n  table{border-collapse:collapse;}\n  button{font-family:inherit;cursor:pointer;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;background:#FCFBF7\">\n\n  <header style=\"background:#10294F;color:#F4F1E8;position:sticky;top:0;z-index:20;border-bottom:3px solid #C8202B\">\n    <div style=\"max-width:1260px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n      <div style=\"position:relative;width:44px;height:44px;flex:none\" aria-hidden=\"true\">\n        <span style=\"position:absolute;width:21px;height:21px;top:0;left:9px;transform:rotate(22deg);background:#C8202B;border:1px solid rgba(124,138,160,0.4);border-radius:1px;z-index:1\"><\u002Fspan>\n        <span style=\"position:absolute;width:21px;height:21px;top:9px;left:0;transform:rotate(-10deg);background:#F4F1E8;border:1px solid rgba(124,138,160,0.4);border-radius:1px;z-index:2\"><\u002Fspan>\n        <span style=\"position:absolute;width:21px;height:21px;top:17px;left:14px;transform:rotate(9deg);background:#1C7A44;border:1px solid rgba(124,138,160,0.4);border-radius:1px;z-index:3\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 280px\">\n        <div style=\"font-size:12px;letter-spacing:0.14em;color:#9DB3D0;font-weight:500\">Análisis retrospectivo por confederación<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:700;letter-spacing:0.005em;line-height:1.2\">Modelo de evaluación del desempeño de selecciones<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:#9DB3D0;text-align:right;line-height:1.55\">48 selecciones · 6 confederaciones · 12 grupos<br>Datos hasta el corte disponible · base FIFA 11·06·2026<\u002Fdiv>\n    <\u002Fdiv>\n    <nav aria-label=\"Vistas del panel\" style=\"max-width:1260px;margin:0 auto;padding:0 18px;display:flex;gap:0;flex-wrap:wrap\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button type=\"button\" onclick=\"{{ n.onClick }}\" aria-current=\"{{ n.current }}\" style=\"{{ n.style }}\">{{ n.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <main style=\"flex:1;max-width:1260px;margin:0 auto;padding:26px 22px 60px;width:100%\">\n\n    <!-- ================= RANKINGS ================= -->\n    <sc-if value=\"{{ isRankings }}\" hint-placeholder-val=\"{{ true }}\">\n    <section aria-label=\"Rankings\" data-screen-label=\"Rankings\">\n      <div style=\"margin-bottom:18px\">\n        <div style=\"font-size:11px;letter-spacing:0.12em;font-weight:600;color:#C8202B\">Rankings<\u002Fdiv>\n        <h1 style=\"font-size:19px;font-weight:700;margin:5px 0 0;letter-spacing:-0.005em\">Clasificación general del modelo<\u002Fh1>\n        <p style=\"font-size:12.5px;color:#6E6A61;margin:7px 0 0;line-height:1.6;max-width:74ch\">Ordena por cualquier columna. <strong style=\"color:#16181D;font-weight:600\">#<\u002Fstrong> es la posición del modelo · <strong style=\"color:#16181D;font-weight:600\">Cambio<\u002Fstrong> es la variación de posición frente a la actualización anterior.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px\">\n        <input type=\"search\" value=\"{{ query }}\" oninput=\"{{ onQuery }}\" placeholder=\"Buscar selección…\" aria-label=\"Buscar selección por nombre\" style=\"font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid #C7BEAD;background:#fff;color:#16181D;width:220px;border-radius:2px\">\n        <div role=\"group\" aria-label=\"Filtrar por confederación\" style=\"display:flex;gap:6px;flex-wrap:wrap\">\n          <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"7\">\n            <button type=\"button\" onclick=\"{{ c.onClick }}\" aria-pressed=\"{{ c.pressed }}\" style=\"{{ c.style }}\"><span style=\"{{ c.dot }}\"><\u002Fspan>{{ c.code }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-left:auto;font-size:12px;color:#6E6A61;white-space:nowrap\">{{ resultCount }} selecciones<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"overflow:auto;border:1px solid #E4DCC9;background:#fff;max-height:66vh\">\n        <sc-for list=\"{{ headers }}\" as=\"h\" hint-placeholder-count=\"7\">\n                <\u002Fsc-for><sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"14\">\n              <\u002Fsc-for><table style=\"width:100%;font-size:12.5px;min-width:780px\">\n          <thead>\n            <tr>\n              <th scope=\"col\" aria-sort=\"{{ h.aria }}\" style=\"{{ h.thStyle }}\">\n                  <button type=\"button\" onclick=\"{{ h.onClick }}\" title=\"{{ h.title }}\" style=\"{{ h.btnStyle }}\"><span>{{ h.label }}<\u002Fspan><span style=\"{{ h.indStyle }}\">{{ h.ind }}<\u002Fspan><\u002Fbutton>\n                <\u002Fth>\n              \n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"{{ r.rowStyle }}\">\n                <td style=\"{{ r.rankStyle }}\">{{ r.rank }}<\u002Ftd>\n                <td style=\"{{ tdName }}\"><span style=\"font-weight:600\">{{ r.name }}<\u002Fspan> <span style=\"{{ codeStyle }}\">{{ r.code }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ tdConf }}\"><span style=\"{{ r.dot }}\"><\u002Fspan>{{ r.conf }}<\u002Ftd>\n                <td style=\"{{ tdNum }}\">{{ r.fifa }}<\u002Ftd>\n                <td style=\"{{ tdNum }}\">{{ r.elo }}<\u002Ftd>\n                <td style=\"{{ tdModel }}\">{{ r.model }}<\u002Ftd>\n                <td style=\"{{ tdNum }}\"><span style=\"{{ r.deltaStyle }}\">{{ r.deltaArrow }} {{ r.deltaLabel }}<\u002Fspan><\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <p style=\"font-size:11px;color:#6E6A61;margin-top:10px;line-height:1.6\">Cambio: <span style=\"color:#1C7A44;font-weight:600\">▲ verde<\u002Fspan> = ascenso · <span style=\"color:#C8202B;font-weight:600\">▼ rojo<\u002Fspan> = descenso. Elo y rating del modelo derivados del ranking FIFA — ver pestaña <strong style=\"color:#6E6A61\">Tokens<\u002Fstrong>.<\u002Fp>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ================= CONFEDERACIONES ================= -->\n    <sc-if value=\"{{ isConf }}\" hint-placeholder-val=\"{{ true }}\">\n    <section aria-label=\"Confederaciones\" data-screen-label=\"Confederaciones\">\n      <div style=\"margin-bottom:18px\">\n        <div style=\"font-size:11px;letter-spacing:0.12em;font-weight:600;color:#C8202B\">Confederaciones<\u002Fdiv>\n        <h1 style=\"font-size:19px;font-weight:700;margin:5px 0 0;letter-spacing:-0.005em\">Rendimiento agregado por confederación<\u002Fh1>\n        <p style=\"font-size:12.5px;color:#6E6A61;margin:7px 0 0;line-height:1.6;max-width:74ch\">Rating promedio inicial vs. actual, desempeño observado frente al esperado por el modelo, y transferencia neta de rating en los cruces entre confederaciones.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(322px,1fr));gap:15px\">\n        <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <article style=\"border:1px solid #E4DCC9;background:#fff;border-top:3px solid;border-top-color:{{ c.color }};padding:16px 18px\">\n            <div style=\"display:flex;align-items:center;gap:9px;border-bottom:1px solid #EFE8D6;padding-bottom:10px\">\n              <span style=\"{{ c.dot }}\"><\u002Fspan>\n              <span style=\"font-size:15px;font-weight:700;letter-spacing:0.01em\">{{ c.name }}<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:#6E6A61\">{{ c.teamsLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin:13px 0 2px;flex-wrap:wrap\">\n              <span style=\"font-size:13px;color:#6E6A61;font-variant-numeric:tabular-nums\">{{ c.ini }}<\u002Fspan>\n              <span style=\"font-size:13px;color:#6E6A61\">→<\u002Fspan>\n              <span style=\"font-size:26px;font-weight:700;letter-spacing:-0.01em;font-variant-numeric:tabular-nums\">{{ c.act }}<\u002Fspan>\n              <span style=\"{{ c.deltaStyle }};font-size:13px;margin-left:2px\">{{ c.deltaArrow }} {{ c.deltaLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:0.04em;color:#6E6A61;margin-bottom:13px\">Rating promedio · inicial → actual<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px;border-top:1px solid #EFE8D6;padding-top:12px\">\n              <div>\n                <div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61;margin-bottom:5px\">Observado / esperado<\u002Fdiv>\n                <div style=\"font-size:14px;font-weight:600;font-variant-numeric:tabular-nums\">{{ c.obs }} <span style=\"color:#6E6A61;font-weight:400\">/ {{ c.exp }}<\u002Fspan> <span style=\"{{ c.oeStyle }};font-size:12px\">{{ c.oe }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:11px;color:#6E6A61;margin-top:2px\">puntos en cruces<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61;margin-bottom:5px\">Transferencia neta<\u002Fdiv>\n                <div style=\"font-size:14px;font-weight:600;font-variant-numeric:tabular-nums\"><span style=\"{{ c.netStyle }}\">{{ c.netArrow }} {{ c.net }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:11px;color:#6E6A61;margin-top:2px\">puntos de rating<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:22px;border:1px solid #E4DCC9;background:#fff;padding:20px\">\n        <h2 style=\"font-size:15px;font-weight:700;margin:0\">Cambio de rating por confederación<\u002Fh2>\n        <p style=\"font-size:12px;color:#6E6A61;margin:5px 0 18px\">Cambio neto de rating promedio (actual − inicial). Barras divergentes desde el eje cero.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:112px 1fr 54px;gap:12px;margin-bottom:9px\">\n          <div><\u002Fd yle=\"display:flex;flex-direction:column;gap:4px\">\n          <label for=\"team-select\" style=\"font-size:11px;letter-spacing:0.05em;color:#6E6A61\">Seleccionar equipo<\u002Flabel>\n          <select id=\"team-select\" value=\"{{ selectedTeam }}\" onchange=\"{{ onTeamChange }}\" aria-label=\"Seleccionar equipo\" style=\"font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid #C7BEAD;background:#fff;color:#16181D;border-radius:2px;min-width:240px\">\n            \n              <optgroup label=\"{{ g.label }}\">\n                \n                  <option value=\"{{ o.code }}\">{{ o.label }}<\u002Foption>\n                \n              <\u002Foptgroup>\n            \n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:20px;align-items:center;border:1px solid #E4DCC9;background:#fff;border-left:4px solid;border-left-color:{{ team.color }};padding:16px 20px;flex-wrap:wrap\">\n        <div style=\"background:{{ team.color }};width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;letter-spacing:0.02em;border-radius:2px;flex:none\">{{ team.code }}<\u002Fdiv>\n        <div style=\"flex:1 1 auto;min-width:150px\">\n          <div style=\"font-size:18px;font-weight:700\">{{ team.name }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:4px;font-size:11.5px;color:#6E6A61\"><span style=\"{{ team.confDot }}\"><\u002Fspan>{{ team.conf }} · grupo {{ team.group }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;flex-wrap:wrap\">\n          <div><div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61\">Rating actual<\u002Fdiv><div style=\"font-size:22px;font-weight:700;font-variant-numeric:tabular-nums\">{{ team.ratingNow }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61\">Rank modelo<\u002Fdiv><div style=\"font-size:22px;font-weight:700;font-variant-numeric:tabular-nums\">{{ team.rankNow }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61\">Cambio torneo<\u002Fdiv><div style=\"{{ team.deltaTourStyle }};font-size:22px;font-variant-numeric:tabular-nums\">{{ team.deltaTourArrow }} {{ team.deltaTour }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:11px;letter-spacing:0.03em;color:#6E6A61\">Partidos<\u002Fdiv><div style=\"font-size:22px;font-weight:700;font-variant-numeric:tabular-nums\">{{ team.nMatches }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #E4DCC9;background:#fff;padding:16px 20px;margin-top:16px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px\">\n          <h2 style=\"font-size:14px;font-weight:700;margin:0\">Rating del modelo por partido<\u002Fh2>\n          <div style=\"font-size:11px;color:#6E6A61;display:flex;align-items:center;gap:6px\"><span style=\"display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid #E0A81E;background:#FBF3DA\"><\u002Fspan> cruce entre confederaciones<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:10px\">{{ chartEl }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"overflow:auto;border:1px solid #E4DCC9;background:#fff;margin-top:16px\">\n        <sc-for list=\"{{ matchHeaders }}\" as=\"m\" hint-placeholder-count=\"9\">\n                <\u002Fsc-for><sc-for list=\"{{ matchRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <\u002Fsc-for><table style=\"width:100%;font-size:12px;min-width:860px\">\n          <thead>\n            <tr>\n              <th scope=\"col\" style=\"{{ m.style }}\" title=\"{{ m.title }}\">{{ m.label }}<\u002Fth>\n              \n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"{{ r.rowStyle }}\">\n                <td style=\"{{ r.faseStyle }}\">{{ r.fase }}<\u002Ftd>\n                <td style=\"{{ mtdRival }}\"><span style=\"{{ r.rivalDot }}\"><\u002Fspan><span style=\"font-weight:600\">{{ r.rival }}<\u002Fspan> <span style=\"{{ codeStyle }}\">{{ r.rivalCode }}<\u002Fspan> <span style=\"{{ r.crossBadge }}\" title=\"Cruce entre confederaciones\">{{ r.crossMark }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ r.scoreStyle }}\">{{ r.score }}<\u002Ftd>\n                <td style=\"{{ mtdNum }}\">{{ r.imp }}<\u002Ftd>\n                <td style=\"{{ mtdNum }}\">{{ r.goalFactor }}<\u002Ftd>\n                <td style=\"{{ mtdNum }}\"><span style=\"{{ r.surpriseStyle }}\">{{ r.surprise }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ mtdNum }}\"><span style=\"{{ r.drStyle }}\">{{ r.dr }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ mtdNumStrong }}\">{{ r.rating }}<\u002Ftd>\n                <td style=\"{{ mtdNum }}\">{{ r.rankAfter }}<\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <p style=\"font-size:11px;color:#6E6A61;margin-top:10px;line-height:1.6\">Filas con <span style=\"color:#B4820E;font-weight:600\">⇄<\u002Fspan> = cruce entre confederaciones. W−We = resultado observado menos esperado (sorpresa). ΔR = cambio de rating del partido. Importancia = ponderación de la fase.<\u002Fp>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ================= METODOLOGÍA ================= -->\n    <sc-if value=\"{{ isMetodologia }}\" hint-placeholder-val=\"{{ true }}\">\n    <section aria-label=\"Metodología\" data-screen-label=\"Metodología\">\n      <div style=\"margin-bottom:18px\">\n        <div style=\"font-size:11px;letter-spacing:0.12em;font-weight:600;color:#C8202B\">Metodología<\u002Fdiv>\n        <h1 style=\"font-size:19px;font-weight:700;margin:5px 0 0;letter-spacing:-0.005em\">Qué significa cada indicador<\u002Fh1>\n        <p style=\"font-size:12.5px;color:#6E6A61;margin:7px 0 0;line-height:1.6;max-width:74ch\">Definiciones de los términos usados en Rankings, Confederaciones y Equipo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px\">\n        <sc-for list=\"{{ methodGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n          <div style=\"border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n            <h2 style=\"font-size:13px;font-weight:700;margin:0 0 14px;letter-spacing:0.01em;color:#10294F\">{{ grp.title }}<\u002Fh2>\n            <sc-for list=\"{{ grp.terms }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <div style=\"padding:9px 0;border-bottom:1px solid #F3EEE0\">\n                <div style=\"font-size:12.5px;font-weight:700;color:#16181D\">{{ t.term }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#6E6A61;line-height:1.55;margin-top:3px\">{{ t.def }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ================= TOKENS ================= -->\n    <sc-if value=\"{{ isTokens }}\" hint-placeholder-val=\"{{ true }}\">\n    <section aria-label=\"Tokens de diseño\" data-screen-label=\"Tokens\">\n      <div style=\"margin-bottom:18px\">\n        <div style=\"font-size:11px;letter-spacing:0.12em;font-weight:600;color:#C8202B\">Tokens<\u002Fdiv>\n        <h1 style=\"font-size:19px;font-weight:700;margin:5px 0 0;letter-spacing:-0.005em\">Sistema para replicar en HTML/CSS puro<\u002Fh1>\n        <p style=\"font-size:12.5px;color:#6E6A61;margin:7px 0 0;line-height:1.6;max-width:74ch\">Paleta derivada del emblema del Mundial 2026 (rojo, azul marino, verde) extendida a seis confederaciones. Sin frameworks: variables CSS y una sola familia monoespaciada.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px\">\n\n        <div style=\"border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n          <h2 style=\"font-size:13px;font-weight:700;margin:0 0 14px;letter-spacing:0.01em\">Color · confederaciones<\u002Fh2>\n          <sc-for list=\"{{ tokenConf }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid #F3EEE0\">\n              <span style=\"width:30px;height:30px;border-radius:2px;flex:none;background:{{ t.hex }}\"><\u002Fspan>\n              <span style=\"font-size:12.5px;font-weight:600;flex:1\">{{ t.name }}<\u002Fspan>\n              <code style=\"font-size:12px;color:#6E6A61\">{{ t.hex }}<\u002Fcode>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n          <h2 style=\"font-size:13px;font-weight:700;margin:0 0 14px;letter-spacing:0.01em\">Color · funcional<\u002Fh2>\n          <sc-for list=\"{{ tokenFunc }}\" as=\"t\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid #F3EEE0\">\n              <span style=\"width:30px;height:30px;border-radius:2px;flex:none;background:{{ t.hex }};border:1px solid #E4DCC9\"><\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-size:12px;font-weight:600\">{{ t.name }}<\u002Fdiv><div style=\"font-size:11px;color:#6E6A61\">{{ t.use }}<\u002Fdiv><\u002Fdiv>\n              <code style=\"font-size:12px;color:#6E6A61\">{{ t.hex }}<\u002Fcode>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n          <h2 style=\"font-size:13px;font-weight:700;margin:0 0 6px;letter-spacing:0.01em\">Tipografía<\u002Fh2>\n          <p style=\"font-size:11px;color:#6E6A61;margin:0 0 14px;line-height:1.55\">IBM Plex Mono — 300 / 400 / 600 / 700. Números tabulares en todas las tablas.<\u002Fp>\n          <sc-for list=\"{{ tokenType }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid #F3EEE0\">\n              <span style=\"{{ t.sample }}\">Selección 2026<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:#6E6A61;white-space:nowrap;text-align:right\">{{ t.spec }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n          <h2 style=\"font-size:13px;font-weight:700;margin:0 0 6px;letter-spacing:0.01em\">Espaciado · escala base 4 px<\u002Fh2>\n          <p style=\"font-size:11px;color:#6E6A61;margin:0 0 14px;line-height:1.55\">Múltiplos de 4. Usados en padding, gap y márgenes.<\u002Fp>\n          <sc-for list=\"{{ tokenSpace }}\" as=\"t\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:5px 0\">\n              <code style=\"font-size:11px;color:#6E6A61;width:76px;flex:none\">{{ t.name }}<\u002Fcode>\n              <span style=\"{{ t.bar }}\"><\u002Fspan>\n              <span style=\"font-size:11px;color:#6E6A61;margin-left:auto\">{{ t.px }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div style=\"margin-top:16px;border:1px solid #E4DCC9;background:#fff;padding:18px 20px\">\n        <h2 style=\"font-size:13px;font-weight:700;margin:0 0 12px;letter-spacing:0.01em\">Notas de derivación de datos<\u002Fh2>\n        <ul style=\"font-size:12px;color:#4A4740;line-height:1.75;margin:0;padding-left:18px\">\n          <li><strong>Ranking FIFA<\u002Fstrong> y <strong>selecciones/grupos<\u002Fstrong>: datos reales aportados (corte 11·06·2026).<\u002Fli>\n          <li><strong>Elo<\u002Fstrong>: reescalado lineal de los puntos FIFA — <code style=\"color:#6E6A61\">round(1300 + (pts − 1275) × 1,15)<\u002Fcode>.<\u002Fli>\n          <li><strong>Rating del modelo<\u002Fstrong>: puntos FIFA más un ajuste de forma acotado (±40) derivado de forma determinista por selección; el rank del modelo surge de ordenar ese rating.<\u002Fli>\n          <li><strong>Cambio, línea de tiempo y cruces<\u002Fstrong>: valores retrospectivos ilustrativos hasta el corte disponible. Reemplazables por los reales al actualizar cada ronda.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid #E4DCC9;background:#F6F1E6;padding:14px 22px\">\n    <div style=\"max-width:1260px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:11px;color:#6E6A61\">\n      <span>Modelo de evaluación del desempeño de selecciones · Mundial 2026<\u002Fspan>\n      <span>Análisis retrospectivo — se actualiza por ronda<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view: 'confederaciones', sortKey: 'model', sortDir: 'desc', query: '', conf: 'ALL', team: 'ARG' };\n\n  // ---------- static data ----------\n  CONF_ORDER = ['UEFA','CONMEBOL','CONCACAF','CAF','AFC','OFC'];\n  CONF_COLOR = { UEFA:'#10294F', CONMEBOL:'#C77D0E', CONCACAF:'#C8202B', CAF:'#1C7A44', AFC:'#0E7C86', OFC:'#6A3D7A' };\n\n  RAW = [\n    ['MEX','México','CONCACAF','A',14,1687.48],['RSA','Sudáfrica','CAF','A',60,1428.38],['KOR','Corea del Sur','AFC','A',25,1591.63],['CZE','Chequia','UEFA','A',40,1505.74],\n    ['CAN','Canadá','CONCACAF','B',30,1559.48],['BIH','Bosnia y Herzegovina','UEFA','B',64,1387.22],['QAT','Catar','AFC','B',56,1450.31],['SUI','Suiza','UEFA','B',19,1650.06],\n    ['BRA','Brasil','CONMEBOL','C',6,1765.86],['MAR','Marruecos','CAF','C',7,1755.10],['HAI','Haití','CONCACAF','C',83,1293.10],['SCO','Escocia','UEFA','C',42,1503.34],\n    ['USA','Estados Unidos','CONCACAF','D',17,1671.23],['PAR','Paraguay','CONMEBOL','D',41,1505.35],['AUS','Australia','AFC','D',27,1579.34],['TUR','Turquía','UEFA','D',22,1605.73],\n    ['GER','Alemania','UEFA','E',10,1735.77],['CUW','Curazao','CONCACAF','E',82,1294.77],['CIV','Costa de Marfil','CAF','E',33,1540.87],['ECU','Ecuador','CONMEBOL','E',23,1598.52],\n    ['NED','Países Bajos','UEFA','F',8,1753.57],['JPN','Japón','AFC','F',18,1661.58],['SWE','Suecia','UEFA','F',38,1509.79],['TUN','Túnez','CAF','F',45,1476.41],\n    ['BEL','Bélgica','UEFA','G',9,1742.24],['EGY','Egipto','CAF','G',29,1562.37],['IRN','Irán','AFC','G',20,1619.58],['NZL','Nueva Zelanda','OFC','G',85,1275.58],\n    ['ESP','España','UEFA','H',2,1874.71],['URU','Uruguay','CONMEBOL','H',16,1673.07],['KSA','Arabia Saudita','AFC','H',61,1423.88],['CPV','Cabo Verde','CAF','H',67,1371.11],\n    ['FRA','Francia','UEFA','I',3,1870.70],['SEN','Senegal','CAF','I',15,1684.07],['NOR','Noruega','UEFA','I',31,1557.44],['IRQ','Irak','AFC','I',57,1446.28],\n    ['ARG','Argentina','CONMEBOL','J',1,1877.27],['AUT','Austria','UEFA','J',24,1597.40],['ALG','Argelia','CAF','J',28,1571.03],['JOR','Jordania','AFC','J',63,1387.74],\n    ['POR','Portugal','UEFA','K',5,1767.85],['COL','Colombia','CONMEBOL','K',13,1698.35],['UZB','Uzbekistán','AFC','K',50,1458.73],['COD','RD Congo','CAF','K',46,1474.43],\n    ['ENG','Inglaterra','UEFA','L',4,1828.02],['CRO','Croacia','UEFA','L',11,1714.87],['GHA','Ghana','CAF','L',73,1346.88],['PAN','Panamá','CONCACAF','L',34,1539.16]\n  ];\n\n  // deterministic hash → int\n  hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return Math.abs(h); }\n\n  buildTeams(){\n    if(this._teams) return this._teams;\n    const t = this.RAW.map(([code,name,conf,group,fpos,fpts])=>{\n      const h=this.hash(code);\n      const form=(h%81)-40;                 // -40..40\n      const elo=Math.round(1300+(fpts-1275)*1.15);\n      const model=Math.round(fpts+form);\n      const delta=((this.hash(code+'d')%13)-6); // -6..6 rank change\n      return {code,name,conf,group,fpos,fpts,elo,model,delta,color:this.CONF_COLOR[conf]};\n    });\n    // model rank from sorting model rating desc\n    const byModel=[...t].sort((a,b)=>b.model-a.model);\n    byModel.forEach((x,i)=>x.modelRank=i+1);\n    this._teams=t;\n    return t;\n  }\n\n  // ---------- timelines ----------\n  TL = {\n    ARG:[\n      ['Grupo J','JOR','Jordania','AFC',3,0,25,1.75,0.10,5],\n      ['Grupo J','ALG','Argelia','CAF',2,1,25,1.00,-0.06,-3],\n      ['Grupo J','AUT','Austria','UEFA',2,2,25,1.00,-0.22,-8],\n      ['16avos','CUW','Curazao','CONCACAF',4,0,40,2.00,0.05,4],\n      ['Octavos','MEX','México','CONCACAF',3,1,45,1.50,0.12,9],\n      ['Cuartos','ESP','España','UEFA',2,1,50,1.00,0.08,7]\n    ],\n    MAR:[\n      ['Grupo C','HAI','Haití','CONCACAF',2,0,25,1.50,0.06,4],\n      ['Grupo C','SCO','Escocia','UEFA',1,0,25,1.00,0.10,6],\n      ['Grupo C','BRA','Brasil','CONMEBOL',2,1,25,1.00,0.55,22],\n      ['16avos','SUI','Suiza','UEFA',2,2,40,1.00,0.15,9],\n      ['Octavos','POR','Portugal','UEFA',1,0,45,1.00,0.40,18],\n      ['Cuartos','FRA','Francia','UEFA',0,1,50,1.00,-0.10,-6]\n    ],\n    ESP:[\n      ['Grupo H','KSA','Arabia Saudita','AFC',3,0,25,1.75,0.04,3],\n      ['Grupo H','CPV','Cabo Verde','CAF',4,0,25,2.00,0.03,2],\n      ['Grupo H','URU','Uruguay','CONMEBOL',1,1,25,1.00,-0.12,-5],\n      ['16avos','CZE','Chequia','UEFA',2,0,40,1.50,0.05,3],\n      ['Octavos','NED','Países Bajos','UEFA',2,1,45,1.00,0.10,7],\n      ['Cuartos','ARG','Argentina','CONMEBOL',1,2,50,1.00,-0.18,-9]\n    ]\n  };\n  RANKS = { ARG:[1,1,2,2,1,2], MAR:[7,6,4,4,3,3], ESP:[2,2,2,2,1,2] };\n  IMP_BY_PHASE = { 'Grupo':25, '16avos':40, 'Octavos':45, 'Cuartos':50, 'Semifinal':55 };\n\n  seededRand(s){ return (this.hash(s)%10000)/10000; }\n\n  // deterministic plausible match outcome for teams without curated data\n  calcMatch(self,opp,phase,imp){\n    const diff=self.model-opp.model;\n    const we=1/(1+Math.pow(10,-diff/400));\n    const r1=this.seededRand(self.code+opp.code+phase+'r1');\n    const r2=this.seededRand(self.code+opp.code+phase+'r2');\n    const r3=this.seededRand(self.code+opp.code+phase+'r3');\n    const isGroup=phase==='Grupo';\n    const actual = isGroup ? (r1<we-0.15?1:(r1<we+0.15?0.5:0)) : (r1<we?1:0);\n    const surprise=Math.round((actual-we)*100)/100;\n    const goalDiff=Math.round((actual-0.5)*4+(r2-0.5)*2);\n    let gf=Math.max(0,Math.round(1.2+goalDiff/2+(r3-0.5)));\n    let ga=Math.max(0,Math.round(1.2-goalDiff/2+(r2-0.5)));\n    if(actual===1 && gf<=ga) gf=ga+1;\n    if(actual===0 && gf>=ga) ga=gf+1;\n    if(actual===0.5) ga=gf;\n    const gdAbs=Math.abs(gf-ga);\n    const goalFactor= gdAbs>=3?2.00:gdAbs===2?1.75:gdAbs===1?1.50:1.00;\n    const dr=Math.round(imp*surprise*0.8);\n    return {gf,ga,surprise,goalFactor,dr};\n  }\n\n  // group rivals + a knockout run whose depth is tied to model rank — used for the 45 selecciones without curated data\n  buildSyntheticMatches(self,teams){\n    const groupRivals=this.RAW.filter(t=>t[3]===self.group && t[0]!==self.code);\n    const matches=[];\n    groupRivals.forEach(riv=>{\n      const opp=teams.find(t=>t.code===riv[0]);\n      const c=this.calcMatch(self,opp,'Grupo',this.IMP_BY_PHASE.Grupo);\n      matches.push(['Grupo '+self.group,opp.code,opp.name,opp.conf,c.gf,c.ga,this.IMP_BY_PHASE.Grupo,c.goalFactor,c.surprise,c.dr]);\n    });\n    const rank=self.modelRank;\n    const depth = rank<=4?4:rank<=8?3:rank<=16?2:rank<=32?1:0;\n    const phases=['16avos','Octavos','Cuartos','Semifinal'];\n    const used=new Set([self.code,...groupRivals.map(r=>r[0])]);\n    for(let i=0;i<depth;i++){\n      const phase=phases[i];\n      let idx=this.hash(self.code+phase+'opp')%teams.length, tries=0;\n      while(used.has(teams[idx].code) && tries<teams.length){ idx=(idx+1)%teams.length; tries++; }\n      const opp=teams[idx]; used.add(opp.code);\n      const c=this.calcMatch(self,opp,phase,this.IMP_BY_PHASE[phase]);\n      matches.push([phase,opp.code,opp.name,opp.conf,c.gf,c.ga,this.IMP_BY_PHASE[phase],c.goalFactor,c.surprise,c.dr]);\n    }\n    return matches;\n  }\n\n  buildTimeline(code){\n    const teams=this.buildTeams();\n    const self=teams.find(x=>x.code===code);\n    const raw=this.TL[code] || this.buildSyntheticMatches(self,teams);\n    const ranks=this.RANKS[code];\n    let rating=self.fpts, cumDr=0;\n    return raw.map((m,i)=>{\n      const [fase,rc,rn,rconf,gf,ga,imp,goalF,surp,dr]=m;\n      rating=Math.round(rating+dr); cumDr+=dr;\n      const rankAfter = ranks ? ranks[i] : Math.max(1,Math.min(48,Math.round(self.modelRank-cumDr/12)));\n      return {fase,rivalCode:rc,rival:rn,rivalConf:rconf,gf,ga,imp,goalFactor:goalF,surprise:surp,dr,\n        rating,rankAfter,cross:rconf!==self.conf};\n    });\n  }\n\n  // ---------- confederation aggregates ----------\n  CONF_XTRA = {\n    UEFA:{obs:64,exp:59,net:41}, CONMEBOL:{obs:22,exp:20,net:12}, CONCACAF:{obs:11,exp:14,net:-9},\n    CAF:{obs:26,exp:20,net:23}, AFC:{obs:9,exp:15,net:-31}, OFC:{obs:0,exp:1,net:-6}\n  };\n  buildConfs(){\n    const teams=this.buildTeams();\n    return this.CONF_ORDER.map(conf=>{\n      const g=teams.filter(t=>t.conf===conf);\n      const ini=Math.round(g.reduce((s,t)=>s+t.fpts,0)/g.length);\n      const act=Math.round(g.reduce((s,t)=>s+t.model,0)/g.length);\n      const x=this.CONF_XTRA[conf];\n      return {conf,color:this.CONF_COLOR[conf],n:g.length,ini,act,delta:act-ini,...x,oe:x.obs-x.exp};\n    });\n  }\n\n  // ---------- helpers ----------\n  fmtSigned(n,dec){ const v=dec!=null?n.toFixed(dec):n; return (n>0?'+':'')+v; }\n  posStyle(){ return 'color:#1C7A44;font-weight:600'; }\n  negStyle(){ return 'color:#C8202B;font-weight:600'; }\n  zeroStyle(){ return 'color:#6E6A61;font-weight:500'; }\n  signStyle(n){ return n>0?this.posStyle():n<0?this.negStyle():this.zeroStyle(); }\n  dot(conf){ return 'display:inline-block;width:9px;height:9px;border-radius:2px;flex:none;background:'+this.CONF_COLOR[conf]; }\n\n  setView(v){ this.setState({view:v}); }\n  setSort(k){ this.setState(s=>({sortKey:k, sortDir: s.sortKey===k ? (s.sortDir==='asc'?'desc':'asc') : (k==='name'||k==='conf'?'asc':'desc')})); }\n\n  renderVals(){\n    const S=this.state, teams=this.buildTeams();\n\n    // ---- nav ----\n    const views=[['confederaciones','Confederaciones'],['rankings','Rankings'],['equipo','Equipo'],['metodologia','Metodología'],['tokens','Tokens']];\n    const navItems=views.map(([id,label])=>{\n      const on=S.view===id;\n      return { label, current:on?'page':undefined, onClick:()=>this.setView(id),\n        style:'appearance:none;border:0;background:none;padding:16px 24px;font-size:14.5px;font-weight:'+(on?'700':'500')\n          +';color:'+(on?'#F4F1E8':'#9DB3D0')+';border-bottom:4px solid '+(on?'#F2D34E':'transparent')+';margin-bottom:-3px;letter-spacing:0.01em' };\n    });\n\n    const base={ isRankings:S.view==='rankings', isConf:S.view==='confederaciones', isTeam:S.view==='equipo', isMetodologia:S.view==='metodologia', isTokens:S.view==='tokens', navItems,\n      codeStyle:'font-size:11px;color:#6E6A61;font-weight:500' };\n\n    // ================= RANKINGS =================\n    if(S.view==='rankings'){\n      const chipDefs=[['ALL','Todas',null],...this.CONF_ORDER.map(c=>[c,c,c])];\n      const chips=chipDefs.map(([id,label,conf])=>{\n        const on=S.conf===id;\n        return { code:label, pressed:on, onClick:()=>this.setState({conf:id}),\n          dot: conf?('display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle;background:'+this.CONF_COLOR[conf]):'display:none',\n          style:'appearance:none;display:inline-flex;align-items:center;padding:6px 11px;font-size:11.5px;font-weight:'+(on?'700':'500')\n            +';border:1px solid '+(on?'#10294F':'#C7BEAD')+';background:'+(on?'#10294F':'#fff')+';color:'+(on?'#fff':'#4A4740')+';border-radius:2px' };\n      });\n\n      const cols=[['rank','#','Posición del modelo','left'],['name','Selección','Nombre','left'],['conf','Confederación','Confederación','left'],\n        ['fifa','Rank FIFA','Posición en el ranking FIFA','right'],['elo','Elo','Rating Elo derivado','right'],\n        ['model','Rating modelo','Rating del modelo','right'],['delta','Cambio','Cambio de posición','right']];\n      const headers=cols.map(([key,label,title,align])=>{\n        const active=S.sortKey===key;\n        return { label, title, aria: active?(S.sortDir==='asc'?'ascending':'descending'):'none',\n          ind: active?(S.sortDir==='asc'?'▲':'▼'):'',\n          indStyle:'font-size:10px;color:'+(active?'#C8202B':'transparent'),\n          onClick:()=>this.setSort(key),\n          thStyle:'position:sticky;top:0;z-index:1;background:#F1EADB;border-bottom:2px solid #10294F;padding:0;text-align:'+align+';white-space:nowrap',\n          btnStyle:'appearance:none;border:0;background:none;width:100%;padding:9px 12px;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:0.03em;color:#10294F;display:flex;gap:5px;align-items:center;justify-content:'+(align==='right'?'flex-end':'flex-start') };\n      });\n\n      let list=teams.filter(t=>(S.conf==='ALL'||t.conf===S.conf)&&(!S.query||t.name.toLowerCase().includes(S.query.toLowerCase())||t.code.toLowerCase().includes(S.query.toLowerCase())));\n      const dir=S.sortDir==='asc'?1:-1;\n      list=[...list].sort((a,b)=>{\n        let av,bv;\n        switch(S.sortKey){ case'rank':case'model':av=a.model;bv=b.model;break; case'name':av=a.name;bv=b.name;break;\n          case'conf':av=a.conf;bv=b.conf;break; case'fifa':av=-a.fpos;bv=-b.fpos;break; case'elo':av=a.elo;bv=b.elo;break;\n          case'delta':av=a.delta;bv=b.delta;break; default:av=a.model;bv=b.model; }\n        if(typeof av==='string') return av.localeCompare(bv)*dir;\n        return (av-bv)*dir;\n      });\n\n      const tdBase='padding:8px 12px;border-bottom:1px solid #F1ECDE;white-space:nowrap;';\n      const rows=list.map((t,i)=>({\n        rank:t.modelRank, name:t.name, code:t.code, conf:t.conf, fifa:'#'+t.fpos, elo:t.elo, model:t.model,\n        rowStyle:'background:'+(i%2?'#FCFAF4':'#fff'),\n        rankStyle:tdBase+'text-align:left;font-weight:700;color:#10294F;width:44px;font-variant-numeric:tabular-nums',\n        dot:this.dot(t.conf)+';margin-right:7px;vertical-align:middle',\n        deltaStyle:this.signStyle(t.delta)+';font-variant-numeric:tabular-nums',\n        deltaArrow:t.delta>0?'▲':t.delta<0?'▼':'–', deltaLabel:t.delta===0?'0':Math.abs(t.delta)\n      }));\n\n      return {...base, query:S.query, onQuery:e=>this.setState({query:e.target.value}), chips, headers, rows,\n        resultCount:list.length,\n        tdName:tdBase+'text-align:left', tdConf:tdBase+'text-align:left;color:#4A4740',\n        tdNum:tdBase+'text-align:right;font-variant-numeric:tabular-nums',\n        tdModel:tdBase+'text-align:right;font-weight:700;font-variant-numeric:tabular-nums'};\n    }\n\n    // ================= CONFEDERACIONES =================\n    if(S.view==='confederaciones'){\n      const confs=this.buildConfs();\n      const cards=confs.map(c=>({\n        name:c.conf, color:c.color, teamsLabel:c.n+' selecciones',\n        dot:'display:inline-block;width:11px;height:11px;border-radius:2px;background:'+c.color,\n        ini:c.ini, act:c.act,\n        deltaStyle:this.signStyle(c.delta), deltaArrow:c.delta>0?'▲':c.delta<0?'▼':'–', deltaLabel:this.fmtSigned(c.delta),\n        obs:c.obs, exp:c.exp, oe:'('+this.fmtSigned(c.oe)+')', oeStyle:this.signStyle(c.oe),\n        net:Math.abs(c.net), netStyle:this.signStyle(c.net), netArrow:c.net>0?'▲':c.net<0?'▼':'–'\n      }));\n      const maxAbs=Math.max(...confs.map(c=>Math.abs(c.delta)))||1;\n      const bars=[...confs].sort((a,b)=>b.delta-a.delta).map(c=>{\n        const pct=Math.abs(c.delta)/maxAbs*48; // up to 48% each side\n        const barStyle=c.delta>=0\n          ? 'position:absolute;left:50%;top:3px;bottom:3px;width:'+pct+'%;background:'+c.color\n          : 'position:absolute;right:50%;top:3px;bottom:3px;width:'+pct+'%;background:'+c.color;\n        return { code:c.conf, dot:'display:inline-block;width:9px;height:9px;border-radius:2px;background:'+c.color,\n          barStyle, label:this.fmtSigned(c.delta), valStyle:this.signStyle(c.delta) };\n      });\n      return {...base, cards, bars};\n    }\n\n    // ================= EQUIPO =================\n    if(S.view==='equipo'){\n      const teamOptions=this.CONF_ORDER.map(conf=>({\n        label:conf,\n        teams:[...teams].filter(t=>t.conf===conf).sort((a,b)=>a.name.localeCompare(b.name,'es'))\n          .map(t=>({code:t.code, label:t.name+' ('+t.code+')'}))\n      }));\n      const onTeamChange=e=>this.setState({team:e.target.value});\n\n      const self=teams.find(x=>x.code===S.team);\n      const tl=this.buildTimeline(S.team);\n      const last=tl[tl.length-1];\n      const deltaTour=Math.round(last.rating-self.fpts);\n\n      const team={ code:S.team, name:self.name, conf:self.conf, group:self.group, color:self.color,\n        confDot:this.dot(self.conf), ratingNow:last.rating, rankNow:last.rankAfter,\n        deltaTour:Math.abs(deltaTour), deltaTourStyle:this.signStyle(deltaTour), deltaTourArrow:deltaTour>0?'▲':deltaTour<0?'▼':'–',\n        nMatches:tl.length };\n\n      // chart\n      const chartEl=this.buildChart(tl,self);\n\n      const mh=[['Fase','',180,'left'],['Rival','',null,'left'],['Marcador','Goles a favor – en contra',null,'center'],\n        ['Importancia','Ponderación de la fase',null,'right'],['Factor de goles','Multiplicador por margen',null,'right'],\n        ['W−We','Sorpresa: observado − esperado',null,'right'],['Cambio rating','Cambio de rating del partido',null,'right'],\n        ['Rating','Rating tras el partido',null,'right'],['Rank','Posición tras el partido',null,'right']];\n      const matchHeaders=mh.map(([label,title,w,align])=>({label,title,\n        style:'position:sticky;top:0;background:#F1EADB;border-bottom:2px solid '+self.color+';padding:9px 12px;font-size:11px;font-weight:700;letter-spacing:0.02em;color:#10294F;text-align:'+align+';white-space:nowrap'}));\n\n      const mtd='padding:8px 12px;border-bottom:1px solid #F1ECDE;white-space:nowrap;';\n      const matchRows=tl.map((m,i)=>({\n        fase:m.fase, rival:m.rival, rivalCode:m.rivalCode, score:m.gf+'–'+m.ga,\n        imp:m.imp, goalFactor:m.goalFactor.toFixed(2),\n        surprise:this.fmtSigned(m.surprise,2), surpriseStyle:this.signStyle(m.surprise)+';font-variant-numeric:tabular-nums',\n        dr:this.fmtSigned(m.dr), drStyle:this.signStyle(m.dr)+';font-variant-numeric:tabular-nums',\n        rating:m.rating, rankAfter:m.rankAfter,\n        rowStyle:'background:'+(m.cross?'#FBF6E4':(i%2?'#FCFAF4':'#fff')),\n        faseStyle:mtd+'text-align:left;font-weight:600;color:#4A4740'+(m.cross?';box-shadow:inset 3px 0 0 #E0A81E':''),\n        rivalDot:this.dot(m.rivalConf)+';margin-right:7px;vertical-align:middle',\n        crossMark:m.cross?'⇄':'', crossBadge:m.cross?'color:#B4820E;font-weight:700;margin-left:4px':'display:none',\n        scoreStyle:mtd+'text-align:center;font-weight:700;font-variant-numeric:tabular-nums'\n      }));\n\n      return {...base, selectedTeam:S.team, teamOptions, onTeamChange, team, chartEl, matchHeaders, matchRows,\n        mtdRival:mtd+'text-align:left', mtdNum:mtd+'text-align:right;font-variant-numeric:tabular-nums',\n        mtdNumStrong:mtd+'text-align:right;font-weight:700;font-variant-numeric:tabular-nums'};\n    }\n\n    // ================= METODOLOGÍA =================\n    if(S.view==='metodologia'){\n      const methodGroups=[\n        { title:'Rankings y ratings', terms:[\n          {term:'Rank FIFA', def:'Posición oficial de la selección en el ranking FIFA vigente en la fecha de corte de los datos.'},\n          {term:'Elo', def:'Rating Elo estimado a partir de los puntos FIFA, en la escala habitual de este sistema (aprox. 1300–2100).'},\n          {term:'Rating del modelo', def:'Rating propio del modelo, ajustado según el desempeño observado en el torneo. Determina el orden en Rankings.'},\n          {term:'# (rank del modelo)', def:'Posición de la selección al ordenar todas las selecciones por rating del modelo, de mayor a menor.'},\n          {term:'Cambio', def:'Variación de la posición del modelo respecto a la actualización anterior. Verde y ▲ significa que asciende; rojo y ▼, que desciende.'}\n        ]},\n        { title:'Confederaciones', terms:[\n          {term:'Rating promedio · inicial → actual', def:'Promedio del rating de las selecciones de la confederación antes del torneo y en el corte actual.'},\n          {term:'Observado / esperado', def:'Puntos de rating que la confederación ganó o cedió realmente en sus cruces contra otras confederaciones, frente a lo que el modelo esperaba según las probabilidades previas al partido.'},\n          {term:'Transferencia neta', def:'Balance total (puntos ganados menos puntos cedidos) de rating en los cruces de esa confederación con otras.'}\n        ]},\n        { title:'Equipo · línea de tiempo', terms:[\n          {term:'Importancia', def:'Ponderación asignada a la fase del torneo en el cálculo del cambio de rating: la fase de grupos pesa menos que una instancia eliminatoria.'},\n          {term:'Factor de goles', def:'Multiplicador aplicado según el margen de gol del resultado: una goleada pesa más que un triunfo mínimo.'},\n          {term:'Sorpresa (W−We)', def:'Diferencia entre el resultado observado (W: 1 victoria, 0,5 empate, 0 derrota) y el resultado esperado por el modelo antes del partido (We, según la diferencia de rating entre ambos equipos).'},\n          {term:'Cambio de rating', def:'Variación del rating de la selección tras ese partido puntual, resultado de combinar importancia, factor de goles y sorpresa.'},\n          {term:'Cruce entre confederaciones', def:'Partido entre selecciones de distinta confederación. Se resalta porque es el mecanismo que transfiere rating de un bloque continental a otro.'}\n        ]}\n      ];\n      return {...base, methodGroups};\n    }\n\n    // ================= TOKENS =================\n    if(S.view==='tokens'){\n      const tokenConf=this.CONF_ORDER.map(c=>({name:c,hex:this.CONF_COLOR[c]}));\n      const tokenFunc=[\n        {name:'--ink',hex:'#16181D',use:'Texto principal'},\n        {name:'--paper',hex:'#FFFFFF',use:'Fondo de tablas y tarjetas'},\n        {name:'--bg',hex:'#FCFBF7',use:'Fondo de página (papel cálido)'},\n        {name:'--header',hex:'#10294F',use:'Cabecera / azul marino del emblema'},\n        {name:'--accent',hex:'#C8202B',use:'Acento / rojo del emblema'},\n        {name:'--pos',hex:'#1C7A44',use:'Cambio positivo (ascenso)'},\n        {name:'--neg',hex:'#C8202B',use:'Cambio negativo (descenso)'},\n        {name:'--cross',hex:'#E0A81E',use:'Resalte de cruce entre confederaciones'},\n        {name:'--line',hex:'#E4DCC9',use:'Bordes y divisores'},\n        {name:'--muted',hex:'#6E6A61',use:'Texto secundario'}\n      ];\n      const tokenType=[\n        {spec:'700 · 19px',sample:'font-size:19px;font-weight:700;letter-spacing:-0.005em'},\n        {spec:'700 · 15px',sample:'font-size:15px;font-weight:700'},\n        {spec:'600 · 12.5px',sample:'font-size:12.5px;font-weight:600'},\n        {spec:'400 · 12.5px · tablas',sample:'font-size:12.5px;font-weight:400;font-variant-numeric:tabular-nums'},\n        {spec:'500 · 11px · etiqueta',sample:'font-size:11px;font-weight:500;letter-spacing:0.12em;color:#C8202B'},\n        {spec:'300 · 12px · nota',sample:'font-size:12px;font-weight:300;color:#6E6A61'}\n      ];\n      const tokenSpace=[['--space-1',4],['--space-2',8],['--space-3',12],['--space-4',16],['--space-5',24],['--space-6',32],['--space-7',48]]\n        .map(([name,px])=>({name,px:px+'px',bar:'height:12px;background:#10294F;display:inline-block;width:'+px+'px'}));\n      return {...base, tokenConf, tokenFunc, tokenType, tokenSpace};\n    }\n\n    return base;\n  }\n\n  buildChart(tl,self){\n    const pts=[{r:self.fpts,cross:false,label:'Inicial'},...tl.map(m=>({r:m.rating,cross:m.cross,label:m.fase}))];\n    const W=880,H=210,padL=46,padR=16,padT=16,padB=30;\n    const rs=pts.map(p=>p.r);\n    const min=Math.min(...rs)-8, max=Math.max(...rs)+8;\n    const x=i=>padL+(W-padL-padR)*(i/(pts.length-1));\n    const y=r=>padT+(H-padT-padB)*(1-(r-min)/(max-min));\n    const line=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.r).toFixed(1)).join(' ');\n    const area=line+' L'+x(pts.length-1).toFixed(1)+' '+(H-padB)+' L'+padL+' '+(H-padB)+' Z';\n    const gY=[min,(min+max)/2,max].map(v=>Math.round(v));\n    const E=React.createElement;\n    const kids=[];\n    // gridlines + y labels\n    gY.forEach((v,i)=>{ const yy=y(v);\n      kids.push(E('line',{key:'g'+i,x1:padL,x2:W-padR,y1:yy,y2:yy,stroke:'#EFE8D6',strokeWidth:1}));\n      kids.push(E('text',{key:'gl'+i,x:padL-8,y:yy+3,textAnchor:'end',fontSize:11,fill:'#6E6A61'},v));\n    });\n    kids.push(E('path',{key:'area',d:area,fill:self.color,opacity:0.07}));\n    kids.push(E('path',{key:'line',d:line,fill:'none',stroke:self.color,strokeWidth:2}));\n    pts.forEach((p,i)=>{\n      kids.push(E('circle',{key:'p'+i,cx:x(i),cy:y(p.r),r:p.cross?5:3.5,\n        fill:p.cross?'#FBF3DA':self.color, stroke:p.cross?'#E0A81E':self.color, strokeWidth:p.cross?2:1}));\n      kids.push(E('text',{key:'xl'+i,x:x(i),y:H-padB+16,textAnchor:'middle',fontSize:11,fill:'#6E6A61'},p.label));\n    });\n    return E('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',height:'auto',role:'img',\n      'aria-label':'Evolución del rating de '+self.name+' partido a partido',\n      style:{display:'block',fontFamily:\"'IBM Plex Mono', monospace\",overflow:'visible'}},kids);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
